version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sorte-agora-db
    environment:
      POSTGRES_USER: sorteagora
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sorteagora123}
      POSTGRES_DB: sorte_agora
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sorte-agora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorteagora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sorte-agora-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - sorte-agora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sorte-agora-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sorteagora:${DB_PASSWORD:-sorteagora123}@postgres:5432/sorte_agora?schema=public
      REDIS_URL: redis://redis:6379
      # Sem defaults fracos: defina JWT_SECRET e ENCRYPTION_KEY (≥32 chars) no .env
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (min 32 chars)}
      REQUIRE_STRONG_SECRETS: "true"
      CORS_ORIGIN: http://localhost:8080
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      PIX_AUTO_CONFIRM: ${PIX_AUTO_CONFIRM:-false}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sorte-agora-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sorte-agora-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "8080:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sorte-agora-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Observabilidade
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sorte-agora-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - sorte-agora-network

  prometheus:
    image: prom/prometheus:latest
    container_name: sorte-agora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sorte-agora-network

  grafana:
    image: grafana/grafana:latest
    container_name: sorte-agora-grafana
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sorte-agora-network
    depends_on:
      - prometheus

  # Storage opcional (KYC) — use STORAGE_DRIVER=minio-volume e monte o volume no backend
  minio:
    image: minio/minio:latest
    container_name: sorte-agora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - sorte-agora-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  sorte-agora-network:
    driver: bridge
